<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
  <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
  <title>Team Checker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    .question-block {
      margin-bottom: 28px;
    }

    .question-block label {
      display: block;
      color: rgba(255,255,255,0.85);
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .radio-group {
      display: flex;
      gap: 12px;
    }

    .radio-option {
      flex: 1;
    }

    .radio-option input[type="radio"] {
      display: none;
    }

    .radio-option label {
      display: block;
      text-align: center;
      padding: 10px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 0;
    }

    .radio-option input[type="radio"]:checked + label {
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
    }

    .radio-option label:hover {
      border-color: rgba(255,255,255,0.35);
      color: rgba(255,255,255,0.9);
    }

    .input-block {
      margin-bottom: 28px;
    }

    .input-block label {
      display: block;
      color: rgba(255,255,255,0.85);
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .input-block input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-block input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .input-block input:focus {
      border-color: rgba(255,255,255,0.4);
    }

    #signup-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    #signup-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(99, 102, 241, 0.5);
    }

    #signup-btn:active {
      transform: translateY(0);
    }

    #result-box {
      margin-top: 28px;
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #result-box.success {
      background: rgba(74, 222, 128, 0.12);
      border: 2px solid rgba(74, 222, 128, 0.4);
    }

    #result-box.error {
      background: rgba(248, 113, 113, 0.12);
      border: 2px solid rgba(248, 113, 113, 0.4);
    }

    #result-box .congrats {
      font-size: 1.4rem;
      font-weight: 900;
      color: #4ade80;
      margin-bottom: 8px;
    }

    #result-box .team-name {
      font-size: 1.7rem;
      font-weight: 900;
      margin-top: 6px;
    }

    #result-box .team-message {
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    #result-box .error-msg {
      color: #f87171;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .yellow { color: #facc15; }
    .blue   { color: #60a5fa; }
    .red    { color: #f87171; }
    .green  { color: #4ade80; }
  </style>
</head>
<body>

  <div class="card">
    <h1>🏆 Team Checker</h1>
    <p class="subtitle">Complete all steps to find out your team!</p>

    <!-- Question 1 -->
    <div class="question-block">
      <label>1. Are you done with the online registration?</label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" name="registration" id="reg-yes" value="yes">
          <label for="reg-yes">✅ Yes</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="registration" id="reg-no" value="no">
          <label for="reg-no">❌ No</label>
        </div>
      </div>
    </div>

    <!-- Question 2 -->
    <div class="question-block">
      <label>2. Do you have the medical clearance from the clinic?</label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" name="medical" id="med-yes" value="yes">
          <label for="med-yes">✅ Yes</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="medical" id="med-no" value="no">
          <label for="med-no">❌ No</label>
        </div>
      </div>
    </div>

    <!-- Question 3 -->
    <div class="input-block">
      <label>3. Enter your Grade and Section:</label>
      <input type="text" id="grade-section" placeholder="e.g. Grade 10 - Rizal">
    </div>

    <!-- Sign Up Button -->
    <button id="signup-btn">Sign Up</button>

    <!-- Result -->
    <div id="result-box"></div>
  </div>

  <py-script src="main.py"></py-script>
</body>
</html>
